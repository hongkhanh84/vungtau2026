<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sự Kiện Đặc Biệt tại Vũng Tàu</title>
    <style>
        /* CSS để tạo giao diện */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden; /* Ẩn thanh cuộn */
        }

        /* Tạo ảnh nền full màn hình */
        .bg-image {
            background-image: url('https://raw.githubusercontent.com/username/reponame/main/vungtau.jpg'); /* ĐƯỜNG LINK ẢNH VŨNG TÀU */
            background-color: #333; /* Màu nền phụ nếu ảnh lỗi */
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
        }

        /* Lớp phủ mờ để nổi bật chữ */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); /* Màu đen mờ 40% */
        }

        /* Căn giữa nội dung */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
            max-width: 800px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        p.event-date {
            font-size: 1.3rem;
            margin-top: 0;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        /* Style cho bộ đếm */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .time-box {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 20px;
            border-radius: 10px;
            width: 120px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .time-box span {
            display: block;
        }

        .time-value {
            font-size: 3.5rem;
            font-weight: bold;
            line-height: 1;
        }

        .time-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* Reponsive cho điện thoại */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .countdown-container { gap: 10px; }
            .time-box { width: 70px; padding: 10px; }
            .time-value { font-size: 2rem; }
            .time-label { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="bg-image">
        <div class="overlay"></div>
        <div class="content">
            <h1>Hẹn Gặp Tại Vũng Tàu</h1>
            <p class="event-date">10:00 CH - Ngày 10 tháng 04, 2026</p>

            <div class="countdown-container">
                <div class="time-box">
                    <span class="time-value" id="days">00</span>
                    <span class="time-label">Ngày</span>
                </div>
                <div class="time-box">
                    <span class="time-value" id="hours">00</span>
                    <span class="time-label">Giờ</span>
                </div>
                <div class="time-box">
                    <span class="time-value" id="minutes">00</span>
                    <span class="time-label">Phút</span>
                </div>
                <div class="time-box">
                    <span class="time-value" id="seconds">00</span>
                    <span class="time-label">Giây</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // JAVASCRIPT ĐỂ XỬ LÝ ĐẾM NGƯỢC
        
        // 1. Thiết lập thời gian đích (10h tối ngày 10/4/2026)
        // Định dạng: Tháng Ngày, Năm Giờ:Phút:Giây
        const countDownDate = new Date("April 10, 2026 22:00:00").getTime();

        // 2. Cập nhật đếm ngược mỗi 1 giây
        const x = setInterval(function() {

            // Lấy thời gian hiện tại
            const now = new Date().getTime();

            // Tính khoảng cách giữa hiện tại và thời gian đích
            const distance = countDownDate - now;

            // 3. Tính toán Ngày, Giờ, Phút, Giây
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // 4. Hiển thị kết quả vào các phần tử HTML tương ứng
            // Sử dụng helper function để thêm số 0 phía trước nếu < 10 (ví dụ: 09 thay vì 9)
            document.getElementById("days").innerHTML = formatTime(days);
            document.getElementById("hours").innerHTML = formatTime(hours);
            document.getElementById("minutes").innerHTML = formatTime(minutes);
            document.getElementById("seconds").innerHTML = formatTime(seconds);

            // 5. Nếu thời gian đếm ngược kết thúc
            if (distance < 0) {
                clearInterval(x); // Dừng bộ đếm
                document.querySelector(".countdown-container").innerHTML = "<h1>SỰ KIỆN ĐANG DIỄN RA!</h1>";
            }
        }, 1000);

        // Helper function thêm số 0
        function formatTime(time) {
            return time < 10 ? `0${time}` : time;
        }
    </script>

</body>
</html>
